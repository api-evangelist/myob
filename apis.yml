apis:
  - aid: myob:myob-business-api
    name: MYOB Business API
    description: REST-based cloud API for MYOB AccountRight, MYOB Essentials, and MYOB Business. Provides endpoints for managing invoices, bills, contacts (customers, suppliers, employees), general ledger accounts, banking transactions, payroll, tax codes, and financial reporting for SMBs in Australia and New Zealand.
